<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kitchen (18x12)</title>

  <!-- three.js and extras -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
            .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(138, 43, 226, 0.1);
            border: 2px solid #8a2be2;
            color: #8a2be2;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 100;
        }
        
        .back-button:hover {
            background: #8a2be2;
            color: white;
            transform: translateX(-5px);
        }
    #goToTopBtn { display: none; position: fixed; bottom: 85px; right: 25px; z-index: 998; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5); transition: all 0.3s ease; align-items: center; justify-content: center; }
    #goToTopBtn:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.7); }
    #goToTopBtn.show { display: flex; }

    :root { --accent: #8a2be2; --muted: #ddd; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { color: #6a0dad; text-align: center; margin-top: 20px; font-size: 2.2rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

    .upload-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin: 25px 0; max-width: 950px; }

    .tile-section { background: white; border: 2px dashed #ddd; border-radius: 16px; padding: 22px; text-align: center; width: 215px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); transition: all 0.3s ease; position: relative; cursor: pointer; }
    .tile-section:hover { border-color: #8a2be2; box-shadow: 0 10px 30px rgba(138, 43, 226, 0.25); transform: translateY(-8px); }
    .tile-section.has-image { border-color: #4caf50; box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3); }
    .tile-section h3 { margin: 0 0 15px; color: #6a0dad; font-size: 1.25rem; font-weight: 700; }
    .tile-section input[type="file"] { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 10px; width: 90%; font-size: 0.9rem; background: #f9f9f9; }
    .preview { width: 165px; height: 115px; object-fit: cover; margin: 12px auto; border-radius: 12px; display:none; border: 3px solid #eee; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .drag-text { color:#999; font-size:0.9rem; margin-top:10px; font-style: italic; }

    .clear-btn { background: linear-gradient(135deg, #ff5722, #ff9800); color:white; display:none; }
    .clear-btn:hover { box-shadow: 0 6px 18px rgba(255, 87, 34, 0.45); }

    .action-buttons { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; margin: 25px 0; }
    #generateBtn, #fullscreenBtn, #downloadBtn { padding: 16px 32px; border-radius: 35px; border: none; color: white; cursor: pointer; font-weight: 700; font-size: 1.05rem; transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25); }
    #generateBtn { background: linear-gradient(135deg, #8a2be2, #9370db); }
    #generateBtn:hover { box-shadow: 0 10px 30px rgba(138, 43, 226, 0.5); transform: translateY(-4px); }
    #fullscreenBtn { background: linear-gradient(135deg, #ff9800, #ff5722); }
    #fullscreenBtn:hover { box-shadow: 0 10px 30px rgba(255, 152, 0, 0.5); transform: translateY(-4px); }
    #downloadBtn { background: linear-gradient(135deg, #4caf50, #45a049); }
    #downloadBtn:hover { box-shadow: 0 10px 30px rgba(76, 175, 80, 0.5); transform: translateY(-4px); }

    .controls-row { display:flex; gap:15px; align-items:center; justify-content:center; margin-bottom:25px; flex-wrap:wrap; background: white; padding: 12px 25px; border-radius: 30px; box-shadow: 0 3px 15px rgba(0,0,0,0.1); }
    .controls-row label { font-weight: 600; color: #555; display: flex; align-items: center; gap: 8px; }
    .controls-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #8a2be2; }

    canvas { display:none; width:100%; height: calc(100vh - 80px) !important; margin-top:0; border-radius:0; box-shadow: none; }

    footer#designFooter { position: fixed; bottom: 0; left: 0; right: 0; display: none; justify-content: flex-start; padding: 12px 60px 12px 60px; gap: 10px; background: transparent; box-shadow: none; z-index: 999; overflow-x: auto; overflow-y: hidden; white-space: nowrap; max-width: 100vw; scrollbar-width: thin; scrollbar-color: #888 transparent; -webkit-overflow-scrolling: touch; }
    footer#designFooter::-webkit-scrollbar { height: 6px; }
    footer#designFooter::-webkit-scrollbar-track { background: transparent; }
    footer#designFooter::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
    footer#designFooter .design-box { min-width: 70px; height: 70px; background: transparent; border: 2px solid #ddd; border-radius: 12px; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; padding: 4px; flex-shrink: 0; }
    footer#designFooter .design-box:hover { border-color: #8a2be2; box-shadow: 0 4px 12px rgba(138, 43, 226, 0.3); transform: translateY(-3px); }
    footer#designFooter .design-box.active { border-color: #6c63ff; background: transparent; box-shadow: 0 0 15px rgba(108, 99, 255, 0.4); }
    footer#designFooter .design-box img { width: 40px; height: 30px; object-fit: cover; border-radius: 6px; margin-bottom: 3px; }
    footer#designFooter .design-box span { font-size: 0.65rem; color: #333; font-weight: 600; background: transparent; }

    .error { color: #f44336; font-size: 0.85rem; display: none; margin-top: 8px; font-weight: 500; }

    @media (max-width: 768px) {
      .upload-container { gap: 15px; }
      .tile-section { width: 90%; }
      canvas { height: calc(100vh - 120px) !important; }
      footer#designFooter { padding: 10px 15px 10px 15px; gap: 8px; }
      footer#designFooter .design-box { min-width: 60px; height: 60px; }
      h1 { font-size: 1.8rem; }
      .action-buttons { gap: 12px; }
      #generateBtn, #fullscreenBtn, #downloadBtn { padding: 12px 24px; font-size: 0.95rem; }
      #goToTopBtn { width: 45px; height: 45px; bottom: 80px; right: 15px; }
    }
  </style>
</head>
<body>
        <button class="back-button" onclick="history.back()">Back</button>

  <h1>kitchen (18x12) 3D Viewer</h1>

  <div class="upload-container">
    <!-- L -->
    <div class="tile-section" data-category="L" id="sectionL">
      <h3>L Tile</h3>
      <input id="fileInputL" type="file" accept="image/*" />
      <div class="preview-container"><img id="previewL" class="preview" /></div>
      <div class="drag-text">Drag & drop or choose image</div>
      <div class="btn-row">
        <button class="btn clear-btn" id="clearL">Clear</button>
      </div>
      <div id="errorL" class="error"></div>
    </div>

    <!-- D -->
    <div class="tile-section" data-category="D" id="sectionD">
      <h3>D Tile</h3>
      <input id="fileInputD" type="file" accept="image/*" />
      <div class="preview-container"><img id="previewD" class="preview" /></div>
      <div class="drag-text">Drag & drop or choose image</div>
      <div class="btn-row">
        <button class="btn clear-btn" id="clearD">Clear</button>
      </div>
      <div id="errorD" class="error"></div>
    </div>

    <!-- F -->
    <div class="tile-section" data-category="F" id="sectionF">
      <h3>F Tile</h3>
      <input id="fileInputF" type="file" accept="image/*" />
      <div class="preview-container"><img id="previewF" class="preview" /></div>
      <div class="drag-text">Drag & drop or choose image</div>
      <div class="btn-row">
        <button class="btn clear-btn" id="clearF">Clear</button>
      </div>
      <div id="errorF" class="error"></div>
    </div>
  </div>

  <div class="action-buttons">
    <button id="generateBtn">Generate Model</button>
    <button id="fullscreenBtn">Full Screen</button>
    <button id="downloadBtn">Download Video</button>
  </div>

  <div class="controls-row">
    <label><input type="checkbox" id="autoRotateToggle" checked /> Auto-rotate</label>
    <label>Speed: <input type="number" id="rotationSpeed" min="0" max="2" step="0.05" value="0.6" style="width:55px;text-align:center;padding:6px;border-radius:6px;border:1px solid #ddd;" /></label>
  </div>

  <button id="goToTopBtn" title="Go to Top">↑</button>

  <footer id="designFooter" aria-hidden="true"></footer>

  <script src="kitchen3d(2x4).js"></script>
</body>
</html>
