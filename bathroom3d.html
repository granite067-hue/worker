<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Navigator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(138, 43, 226, 0.1);
            border: 2px solid #8a2be2;
            color: #8a2be2;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 100;
        }
        
        .back-button:hover {
            background: #8a2be2;
            color: white;
            transform: translateX(-5px);
        }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f4eaff 0%, #e8d5f5 50%, #dcc5f0 100%);
            padding: 20px;
        }
        
        h1 {
            color: #6a0dad;
            font-size: clamp(22px, 5vw, 32px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
            margin: 0 0 30px 0;
            text-align: center;
        }
        
        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        
        .image-button {
            position: relative;
            width: clamp(150px, 35vw, 280px);
            height: clamp(120px, 28vw, 220px);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(106, 13, 173, 0.35);
            transition: all 0.3s ease;
            background: #fff;
            padding: 0;
        }
        
        .image-button:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(106, 13, 173, 0.5);
        }
        
        .image-button:active {
            transform: translateY(-2px) scale(0.98);
            box-shadow: 0 5px 15px rgba(106, 13, 173, 0.4);
        }
        
        .image-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .button-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(106, 13, 173, 0.9), transparent);
            padding: 15px 10px;
            text-align: center;
        }
        
        .button-overlay span {
            color: white;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 15px;
                font-size: 14px;
            }
            
            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }
            
            .button-container {
                gap: 15px;
                padding: 10px;
            }
            
            .image-button {
                width: 140px;
                height: 110px;
            }
        }
        
        @media (min-width: 481px) and (max-width: 768px) {
            .image-button {
                width: 200px;
                height: 160px;
            }
        }
        
        @media (min-width: 769px) {
            .image-button {
                width: 280px;
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="history.back()">Back</button>
    
    <h1>Select Bathroom Size</h1>
    
    <div class="button-container">
        <button class="image-button" id="button18x12B" title="18x12 Auto">
            <img src="/18x12.png" alt="18x12" onerror="this.src='https://via.placeholder.com/280x220/6a0dad/ffffff?text=18x12+Auto'">
            <div class="button-overlay">
                <span>18x12 Auto</span>
            </div>
        </button>
        
        <button class="image-button" id="button2x4B" title="2x4 Auto">
            <img src="/2x4.png" alt="2x4" onerror="this.src='https://via.placeholder.com/280x220/6a0dad/ffffff?text=2x4+Auto'">
            <div class="button-overlay">
                <span>2x4 Auto</span>
            </div>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Script loaded and ready');
            
            document.getElementById('button18x12B').addEventListener('click', function() {
                console.log('Navigating to bathroom3d(18x12B).html');
                window.location.href = 'bathroom3d(18x12B).html';
            });
            
            document.getElementById('button2x4B').addEventListener('click', function() {
                console.log('Navigating to bathroom3d(2x4B).html');
                window.location.href = 'bathroom3d(2x4B).html';
            });
        });
    </script>
</body>
</html>
