<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Navigator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(138, 43, 226, 0.1);
            border: 2px solid #8a2be2;
            color: #8a2be2;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .back-button:hover {
            background: #8a2be2;
            color: white;
            transform: translateX(-5px);
        }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4eaff;
            color: #333;
            padding: 20px;
        }
        
        .heading-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #6a0dad;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            margin: 0;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .image-button {
            width: 180px;
            height: 135px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.3s;
            padding: 0;
            background: #6a0dad;
        }
        
        .image-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        
        .image-button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.15);
        }
        
        .image-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* Responsive Design */
        
        /* Mobile devices (max-width: 480px) */
        @media screen and (max-width: 480px) {
            .back-button {
                top: 10px;
                left: 10px;
                padding: 8px 15px;
                font-size: 14px;
            }
            
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }
            
            .button-group {
                gap: 10px;
                margin: 8px 0;
            }
            
            .image-button {
                width: 140px;
                height: 105px;
            }
        }
        
        /* Tablet devices (481px to 768px) */
        @media screen and (min-width: 481px) and (max-width: 768px) {
            .back-button {
                top: 15px;
                left: 15px;
            }
            
            h1 {
                font-size: 26px;
            }
            
            .button-group {
                gap: 12px;
            }
            
            .image-button {
                width: 160px;
                height: 120px;
            }
        }
        
        /* Large tablets and small laptops (769px to 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .image-button {
                width: 200px;
                height: 150px;
            }
        }
        
        /* Large laptops and desktops (1025px and above) */
        @media screen and (min-width: 1025px) {
            .image-button {
                width: 220px;
                height: 165px;
            }
            
            .image-button:hover {
                transform: translateY(-5px);
            }
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="history.back()">Back</button>
    <h1>Select kitchen Size</h1>
    <div class="heading-container">
    </div>
    <div class="button-group">
        <button class="image-button" id="button18x12" title="18x12">
            <img src="/18x12.png" alt="18x12" onerror="this.src='https://via.placeholder.com/200x150/6a0dad/ffffff?text=18x12'">
        </button>
        <button class="image-button" id="button2x4" title="2x4">
            <img src="/2x4.png" alt="2x4" onerror="this.src='https://via.placeholder.com/200x150/6a0dad/ffffff?text=2x4'">
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Script loaded and ready');
            
            document.getElementById('button18x12').addEventListener('click', function() {
                console.log('Navigating to kitchen3d(18x12).html');
                window.location.href = 'kitchen3d(18x12).html';
            });
            
            document.getElementById('button2x4').addEventListener('click', function() {
                console.log('Navigating to kitchen3d(2x4).html');
                window.location.href = 'kitchen3d(2x4).html';
            });
        });
    </script>
</body>
</html>
